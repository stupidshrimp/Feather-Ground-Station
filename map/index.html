<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Offline XYZ Map</title>
  <link rel="stylesheet" href="leaflet.css">
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="leaflet.js"></script>
  <script>
    const defaultCenter = [41.8781, -87.6298];
    const defaultZoom = 11;
    let maxAvailableZoom = 13;
    let lastFix = L.latLng(defaultCenter[0], defaultCenter[1]);

    const map = L.map('map', { zoomControl: true, keepBuffer: 1 })
                 .setView(defaultCenter, defaultZoom);

    const tiles = L.tileLayer('chicago_xyz/{z}/{x}/{y}.png', {
      minZoom: 0,
      maxZoom: maxAvailableZoom,
      attribution: ''
    }).addTo(map);

    const gps = L.circleMarker(lastFix, { radius: 6 }).addTo(map);

    const params = new URLSearchParams(window.location.search);
    const wsPort = params.get('wsPort');
    let bridgeSocket = null;
    let reconnectDelayMs = 1000;

    function scheduleReconnect() {
      if (!wsPort) {
        return;
      }
      const delay = reconnectDelayMs;
      reconnectDelayMs = Math.min(reconnectDelayMs * 2, 10000);
      window.setTimeout(connectBridge, delay);
    }

    function handleBridgeMessage(event) {
      let payload;
      try {
        payload = JSON.parse(event.data);
      } catch (err) {
        return;
      }
      if (!payload || typeof payload !== 'object') {
        return;
      }
      switch (payload.type) {
        case 'maxZoom': {
          if ('zoom' in payload) {
            setMaxZoom(Number(payload.zoom));
          }
          break;
        }
        case 'initialView': {
          if ('lat' in payload && 'lon' in payload) {
            setInitialView(Number(payload.lat), Number(payload.lon), Number(payload.zoom));
          }
          break;
        }
        case 'gpsUpdate': {
          if ('lat' in payload && 'lon' in payload) {
            const follow = payload.follow !== undefined ? Boolean(payload.follow) : true;
            updateGPS(Number(payload.lat), Number(payload.lon), follow);
          }
          break;
        }
        default:
          break;
      }
    }

    function connectBridge() {
      if (!wsPort) {
        return;
      }
      try {
        bridgeSocket = new WebSocket(`ws://127.0.0.1:${wsPort}`);
      } catch (err) {
        scheduleReconnect();
        return;
      }
      bridgeSocket.addEventListener('open', function() {
        reconnectDelayMs = 1000;
      });
      bridgeSocket.addEventListener('message', handleBridgeMessage);
      bridgeSocket.addEventListener('close', function() {
        bridgeSocket = null;
        scheduleReconnect();
      });
      bridgeSocket.addEventListener('error', function() {
        if (bridgeSocket) {
          const socket = bridgeSocket;
          bridgeSocket = null;
          socket.close();
        }
      });
    }

    window.setMaxZoom = function(zoom) {
      if (!Number.isFinite(zoom)) {
        return;
      }
      maxAvailableZoom = Math.max(0, zoom);
      tiles.setMaxZoom(maxAvailableZoom);
      if (map.setMaxZoom) {
        map.setMaxZoom(maxAvailableZoom);
      } else {
        map.options.maxZoom = maxAvailableZoom;
      }
    };

    window.setInitialView = function(lat, lon, zoom) {
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        return;
      }
      lastFix = L.latLng(lat, lon);
      gps.setLatLng(lastFix);
      const targetZoom = Number.isFinite(zoom) ? Math.min(maxAvailableZoom, zoom) : map.getZoom();
      map.setView(lastFix, targetZoom, { animate: false });
    };

    window.updateGPS = function(lat, lon, follow = true) {
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        return;
      }
      lastFix = L.latLng(lat, lon);
      gps.setLatLng(lastFix);
      if (follow) {
        map.setView(lastFix, map.getZoom(), { animate: false });
      }
    };

    if (wsPort) {
      connectBridge();
    }
  </script>
</body>
</html>
